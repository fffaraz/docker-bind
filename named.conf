    };
    channel update_log {
        file "/log/update.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel dispatch_log {
        file "/log/dispatch.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel dnssec_log {
        file "/log/dnssec.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel lame-servers_log {
        file "/log/lame-servers.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    category default { default_log; };
    category general { general_log; };
    category database { database_log; };
    category security { security_log; };
    category config { config_log; };
    category resolver { resolver_log; };
    category xfer-in { xfer-in_log; };
    category xfer-out { xfer-out_log; };
    category notify { notify_log; };
    category client { client_log; };
    category unmatched { unmatched_log; };
    category queries { queries_log; };
    category network { network_log; };
    category update { update_log; };
    category dispatch { dispatch_log; };
    category dnssec { dnssec_log; };
    category lame-servers { lame-servers_log; };
};

include "/conf/zones.conf";
