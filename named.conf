options {
    directory "/var/cache/bind";
    minimal-responses yes;
    auth-nxdomain no; # conform to RFC1035
    recursion no;
    hostname none;
    server-id none;
    version none;
    listen-on { any; };
    listen-on-v6 { any; };
    allow-query { any; };
    allow-transfer { none; };
    rate-limit { responses-per-second 100; };
};

logging {
    channel default_log {
        file "/log/default.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel general_log {
        file "/log/general.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel database_log {
        file "/log/database.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel security_log {
        file "/log/security.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel config_log {
        file "/log/config.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel resolver_log {
        file "/log/resolver.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel xfer-in_log {
        file "/log/xfer-in.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel xfer-out_log {
        file "/log/xfer-out.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel notify_log {
        file "/log/notify.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel client_log {
        file "/log/client.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel unmatched_log {
        file "/log/unmatched.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel queries_log {
        file "/log/queries.log" versions 10 size 64m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel network_log {
        file "/log/network.log" versions 10 size 64m;
        severity info;
